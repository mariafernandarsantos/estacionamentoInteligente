<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Campus Parking</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="app-container">

    <main class="dashboard">
      <!-- Recommendations & Alerts Panel -->
      <section class="alerts-section">
        <div class="glass-card recommendations" id="recommendationPanel" style="display: none;">
          <h3><span class="icon">💡</span> Sugestão do Sistema</h3>
          <p id="recommendationText">Nenhuma recomendação no momento.</p>
        </div>
      </section>

      <!-- Sectors Overview (Stats) -->
      <section class="stats-grid" id="sectorsStats">
        <!-- Injetado via JS -->
      </section>

      <!-- Map View -->
      <section class="map-section glass-panel">
        <div class="section-header">
          <h2>Mapa ao Vivo</h2>
          <div class="legend">
            <span class="legend-item"><div class="dot free"></div>Livre</span>
            <span class="legend-item"><div class="dot occupied"></div>Ocupada</span>
            <span class="legend-item"><div class="dot incident"></div>Incidente</span>
          </div>
        </div>
        
        <div class="campus-map" id="campusMap">
          <!-- Setores injetados via JS -->
        </div>
      </section>
      
      <!-- Simulator Controls & Incidents -->
      <div class="bottom-panels">
        <!-- Incident Log -->
        <section class="incidents-panel glass-panel">
          <h2>Incidentes Ativos</h2>
          <div id="incidentsList" class="incident-list">
            <p class="empty-state">Nenhum incidente detectado.</p>
          </div>
        </section>

        <!-- Simulator Control Panel (For Demo) -->
        <section class="simulator-panel glass-panel">
          <h2>Painel do Simulador</h2>
          
          <div class="control-group">
            <label>Injetar Falha:</label>
            <div class="control-inputs">
              <input type="text" id="faultSpotId">
              <select id="faultType">
                <option value="STUCK_OCCUPIED">Travado Ocupado (Stuck Occupied)</option>
                <option value="STUCK_FREE">Travado Livre (Stuck Free)</option>
                <option value="FLAPPING">Instabilidade (Flapping)</option>
              </select>
              <button onclick="injectFault()" class="btn btn-danger">Injetar</button>
            </div>
          </div>

          <div class="control-group">
            <label>Forçar Lotação:</label>
            <div class="control-inputs">
              <select id="fillSectorId">
                <option value="A">Setor A</option>
                <option value="B">Setor B</option>
                <option value="C">Setor C</option>
              </select>
              <button onclick="fillSector()" class="btn btn-warning">Lotar</button>
            </div>
          </div>

          <div class="control-group">
            <label>Remover Falha:</label>
            <div class="control-inputs">
              <input type="text" id="resolveSpotId">
              <button onclick="removeFault()" class="btn btn-success">Remover</button>
            </div>
          </div>
        </section>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
